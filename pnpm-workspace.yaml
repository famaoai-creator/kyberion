packages:
  - 'libs/core'
  - 'libs/shared-*'
  - 'libs/actuators/*'
  - 'satellites/*'
  - 'presence/displays/*'
  - 'presence/bridge/*'
allowBuilds:
  '@anthropic-ai/claude-code': true
  '@scarf/scarf': false
  esbuild: true
  node-pty: true
  onnxruntime-node: true
  protobufjs: true
  puppeteer: true
  sharp: true
  sqlite3: true
  tesseract.js: true
  unrs-resolver: true
overrides:
  marked: ^12.0.2
  xmldom: npm:@xmldom/xmldom@^0.8.10
  trim-newlines: ^3.0.1
  jszip: ^3.10.1
  tar: ^7.5.8
  esbuild: ^0.27.0
  nth-check: ^2.0.1
  '@hono/node-server': 1.19.13
  '@xmldom/xmldom': 0.8.13
  basic-ftp: 5.3.1
  express-rate-limit: 8.2.2
  fast-uri: 3.1.2
  fast-glob: 3.3.3
  flatted: 3.4.2
  form-data: 4.0.6
  hono: 4.12.26
  lodash: 4.18.1
  lodash-es: 4.18.1
  protobufjs: 7.6.3
  picomatch: 4.0.4
  tinyglobby: 0.2.17
  tmp: 0.2.7
  undici: 6.27.0
  ws: 8.21.0
  '@slack/bolt>path-to-regexp': 8.4.2
  'router>path-to-regexp': 8.4.2
  'express>path-to-regexp': 0.1.13
