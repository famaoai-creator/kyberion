<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyberion Sovereign Hub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #0d0f14; overflow: hidden; }
        
        #sidebar { 
            position: absolute;
            top: 0; left: 0; bottom: 0;
            width: 200px;
            background: #1a1d23; border-right: 1px solid #333; 
            display: flex; flex-direction: column; padding: 10px; gap: 10px;
            box-sizing: border-box;
            z-index: 10;
        }
        .session-item { 
            padding: 8px; background: #2a2e37; border-radius: 4px; color: #aaa; cursor: pointer; font-size: 12px;
            border: 1px solid transparent; transition: all 0.2s;
        }
        .session-item:hover { background: #3a3f4b; }
        .session-item.active { border-color: #00f2ff; color: #00f2ff; background: #1a1d23; }
        #new-session { 
            padding: 8px; background: #00f2ff; color: #000; border: none; border-radius: 4px; 
            cursor: pointer; font-weight: bold; font-size: 12px;
        }
        
        #main-area {
            position: absolute;
            top: 0; left: 200px; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            background: #0d0f14;
        }

        #status-header {
            height: 30px;
            background: #1a1d23; padding: 0 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        #terminal-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #terminal { 
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
        }

        .indicator { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .indicator.on { background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        .ai-active { color: #ff00ff; animation: pulse 1s infinite; font-weight: bold; font-size: 11px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color: #fff; font-size: 14px; margin: 0 0 10px 0;">Sessions</h2>
        <div id="session-list" style="display: flex; flex-direction: column; gap: 5px; flex: 1; overflow-y: auto;"></div>
        <button id="new-session">+ New Session</button>
    </div>
    
    <div id="main-area">
        <div id="status-header">
            <div id="conn-indicator" class="indicator"></div>
            <span id="status-text" style="color: #00f2ff; font-family: monospace; font-size: 12px;">CONNECTING...</span>
            <span id="ai-text" style="display:none;" class="ai-active">AI ACTIVE</span>
        </div>
        <div id="terminal-wrapper">
            <div id="terminal"></div>
        </div>
    </div>
    <script>
        const sessionList = document.getElementById('session-list');
        const statusText = document.getElementById('status-text');
        const connIndicator = document.getElementById('conn-indicator');
        const aiText = document.getElementById('ai-text');

        const term = new Terminal({
            theme: { background: '#0d0f14', foreground: '#e0e0e0', cursor: '#00f2ff' },
            cursorBlink: true, 
            fontSize: 14, 
            fontFamily: 'Menlo, Monaco, monospace'
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        
        let socket;
        let currentSessionId = localStorage.getItem('sovereign_session_id');

        // Defer initialization to ensure flexbox layout is calculated
        setTimeout(() => {
            term.open(document.getElementById('terminal'));
            fitAddon.fit();
            connect();
            fetchSessions();
        }, 50);

        function getTerminalToken() {
            return localStorage.getItem('kyberion_terminal_token');
        }

        function authHeaders() {
            const token = getTerminalToken();
            return token ? { 'Authorization': `Bearer ${token}` } : {};
        }

        async function fetchSessions() {
            try {
                const res = await fetch('/sessions', { headers: authHeaders() });
                const list = await res.json();
                sessionList.innerHTML = '';
                list.forEach(s => {
                    const div = document.createElement('div');
                    div.className = `session-item ${s.id === currentSessionId ? 'active' : ''}`;
                    div.innerText = `${s.name}${s.connected ? ' • live' : ''}${s.active_brain && s.active_brain !== 'none' ? ` • ${s.active_brain}` : ''}`;
                    div.onclick = () => switchSession(s.id);
                    sessionList.appendChild(div);
                });
            } catch (e) {}
        }

        function switchSession(id) {
            if (id === currentSessionId) return;
            localStorage.setItem('sovereign_session_id', id);
            localStorage.removeItem('sovereign_session_name');
            location.reload();
        }

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
            const token = getTerminalToken();
            const wsUrl = token
                ? `${protocol}://${location.host}?token=${encodeURIComponent(token)}`
                : `${protocol}://${location.host}`;
            socket = new WebSocket(wsUrl);
            socket.onopen = () => {
                connIndicator.classList.add('on');
                // Fit BEFORE sending init to get correct initial size
                fitAddon.fit();
                socket.send(JSON.stringify({ 
                    type: 'init', sessionId: currentSessionId, cols: term.cols, rows: term.rows, name: localStorage.getItem('sovereign_session_name')
                }));
            };
            socket.onmessage = (event) => {
                if (event.data.startsWith('{')) {
                    try {
                        const p = JSON.parse(event.data);
                        if (p.type === 'session_ready') {
                            currentSessionId = p.sessionId;
                            localStorage.setItem('sovereign_session_id', currentSessionId);
                            localStorage.setItem('sovereign_session_name', p.name || currentSessionId);
                            statusText.innerText = (p.name || currentSessionId).toUpperCase();
                            statusText.style.color = '#00f2ff';
                            fitAddon.fit();
                            // Sync size immediately after session is ready
                            socket.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                            fetchSessions();
                            return;
                        }
                        if (p.type === 'ai_activity') {
                            aiText.style.display = p.active ? 'inline' : 'none';
                            return;
                        }
                    } catch (e) {}
                }
                term.write(event.data);
            };
            socket.onclose = () => {
                connIndicator.classList.remove('on');
                statusText.innerText = 'RECONNECTING...';
                setTimeout(connect, 3000);
            };
        }

        term.onData(data => {
            if (socket?.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ type: 'input', data }));
        });

        window.addEventListener('resize', () => {
            if (socket?.readyState === WebSocket.OPEN) {
                fitAddon.fit();
                socket.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
            }
        });

        document.getElementById('new-session').onclick = async () => {
            const name = prompt('Session Name:');
            if (name) {
                try {
                    const res = await fetch('/sessions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', ...authHeaders() },
                        body: JSON.stringify({ name })
                    });
                    const created = await res.json();
                    localStorage.setItem('sovereign_session_id', created.id);
                    localStorage.setItem('sovereign_session_name', created.name);
                    location.reload();
                } catch (e) {
                    alert('Failed to create session');
                }
            }
        };

        document.body.addEventListener('click', () => term.focus());

        // Multiple adjustments to ensure DOM is ready
        [100, 500, 1000].forEach(delay => {
            setTimeout(() => {
                window.dispatchEvent(new Event('resize')); // Trigger layout recalculation
                fitAddon.fit();
                if (socket?.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
                }
            }, delay);
        });
    </script>
</body>
</html>
