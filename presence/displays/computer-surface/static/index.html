<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computer Surface</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111a;
        --panel: rgba(255,255,255,0.04);
        --border: rgba(255,255,255,0.1);
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.55);
        --accent: #7dd3fc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #12324a 0%, var(--bg) 42%, #02060a 100%);
        color: var(--text);
        font-family: "IBM Plex Sans", "Inter", system-ui, sans-serif;
      }
      .shell {
        width: min(980px, calc(100vw - 32px));
        margin: 24px auto;
        display: grid;
        gap: 16px;
      }
      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 24px;
        padding: 20px;
        backdrop-filter: blur(16px);
      }
      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .title {
        margin-top: 10px;
        font-size: 28px;
        font-weight: 700;
      }
      .sub {
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
      }
      .grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .metric {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px;
        background: rgba(0,0,0,0.16);
      }
      .metric .label {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .metric .value {
        margin-top: 8px;
        font-size: 16px;
        font-weight: 600;
        word-break: break-word;
      }
      .path {
        margin-top: 12px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        color: #d1f5ff;
        font-size: 12px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="eyebrow">Performance Surface</div>
        <div class="title">Computer Surface</div>
        <div class="sub">Live state for governed browser and terminal interactions. This surface receives A2UI state updates from computer interaction executors.</div>
      </section>
      <section class="panel">
        <div class="grid">
          <div class="metric"><div class="label">Session</div><div class="value" id="sessionId">—</div></div>
          <div class="metric"><div class="label">Executor</div><div class="value" id="executor">—</div></div>
          <div class="metric"><div class="label">Status</div><div class="value" id="status">idle</div></div>
          <div class="metric"><div class="label">Latest Action</div><div class="value" id="latestAction">—</div></div>
          <div class="metric"><div class="label">Target</div><div class="value" id="target">—</div></div>
          <div class="metric"><div class="label">Action Count</div><div class="value" id="actionCount">0</div></div>
        </div>
        <div class="path" id="detail">No interaction detail yet.</div>
        <div class="path" id="screenshotPath"></div>
      </section>
    </main>
    <script>
      const ids = {
        sessionId: document.getElementById("sessionId"),
        executor: document.getElementById("executor"),
        status: document.getElementById("status"),
        latestAction: document.getElementById("latestAction"),
        target: document.getElementById("target"),
        actionCount: document.getElementById("actionCount"),
        detail: document.getElementById("detail"),
        screenshotPath: document.getElementById("screenshotPath"),
      };

      function applyState(payload) {
        const surface = payload?.surfaces?.["computer-surface"];
        const data = surface?.data || {};
        ids.sessionId.textContent = data.sessionId || "—";
        ids.executor.textContent = data.executor || "—";
        ids.status.textContent = data.status || "idle";
        ids.latestAction.textContent = data.latestAction || "—";
        ids.target.textContent = data.target || "—";
        ids.actionCount.textContent = String(data.actionCount || 0);
        ids.detail.textContent = data.detail || "No interaction detail yet.";
        ids.screenshotPath.textContent = data.screenshotPath ? `screenshot: ${data.screenshotPath}` : "";
      }

      fetch("/api/state").then((res) => res.json()).then(applyState).catch(() => {});
      const source = new EventSource("/api/stream");
      source.addEventListener("state", (event) => {
        try {
          applyState(JSON.parse(event.data));
        } catch (_) {}
      });
    </script>
  </body>
</html>
