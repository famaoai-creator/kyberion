<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Kyberion wordmark</title>
  <desc id="desc">A dark gradient wordmark with an orbit-style emblem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111a"/>
      <stop offset="100%" stop-color="#10263b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#f5d0fe"/>
    </linearGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="280" rx="36" fill="url(#bg)"/>
  <circle cx="150" cy="140" r="84" fill="url(#accent)" opacity="0.16"/>
  <circle cx="150" cy="140" r="50" fill="url(#orb)" opacity="0.94" filter="url(#shadow)"/>
  <path d="M104 137c12-30 36-50 46-50s34 20 46 50c-12 18-33 28-46 28s-34-10-46-28Z" fill="#0f172a"/>
  <path d="M125 108c4 12 10 18 25 18s21-6 25-18" fill="none" stroke="#67e8f9" stroke-width="8" stroke-linecap="round"/>
  <path d="M130 165c10 8 17 11 20 11s10-3 20-11" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
  <text x="280" y="132" fill="#f8fafc" font-size="72" font-weight="700" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.5">
    Kyberion
  </text>
  <text x="281" y="184" fill="#cbd5e1" font-size="28" font-weight="500" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="0.3">
    Organization work loop engine
  </text>
  <g fill="#94a3b8" font-size="22" font-weight="500" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="281" y="228">Agent orchestration</text>
    <text x="486" y="228">Browser + voice automation</text>
    <text x="786" y="228">Audit trails</text>
  </g>
</svg>
