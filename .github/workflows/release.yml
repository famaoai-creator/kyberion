name: Release

env:
  PUPPETEER_SKIP_DOWNLOAD: 'true'

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Validate release surface
        run: pnpm run validate

      - name: Check golden outputs
        run: pnpm run check:golden

      - name: Extract release notes from changelog
        run: pnpm run release:notes -- --ref "${{ github.ref_name }}" --output active/shared/tmp/release-notes.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file active/shared/tmp/release-notes.md
