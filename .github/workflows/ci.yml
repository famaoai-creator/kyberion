name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check commit subject
        if: github.event_name == 'push'
        run: pnpm run check:commit-subject

      - name: Build project
        run: pnpm run build

      - name: Lint check
        run: pnpm run lint

      - name: TypeScript type check
        run: pnpm run typecheck

      - name: Check ESM integrity
        run: pnpm run check:esm

      - name: Check contract schemas
        run: pnpm run check:contract-schemas

      - name: Validate capability discovery
        run: node dist/scripts/capability_discovery.js > /dev/null

      - name: Validate surface runtime contract
        run: node dist/scripts/surface_runtime.js --action status > /dev/null

      - name: Verify no build artifacts in source control
        run: |
          STALE=$(git diff --name-only -- 'libs/core/' | grep -E '\.(js|js\.map|d\.ts|d\.ts\.map)$' | head -5)
          if [ -n "$STALE" ]; then
            echo "::error::Build artifacts detected in source tree"
            exit 1
          fi

  intent-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-validate
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Run lightweight intent smoke suite
        run: pnpm run smoke:intent -- --output /tmp/intent-smoke

      - name: Upload intent smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intent-smoke-logs
          path: /tmp/intent-smoke
          retention-days: 14

  test:
    runs-on: ubuntu-latest
    needs: [lint-and-validate, intent-smoke]
    strategy:
      fail-fast: false
      matrix:
        test-suite: [smoke, unit, integration]
        include:
          - test-suite: smoke
            command: pnpm run test
          - test-suite: unit
            command: pnpm run test:coverage
          - test-suite: integration
            command: pnpm run test:integration
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Run ${{ matrix.test-suite }} tests
        run: ${{ matrix.command }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.test-suite == 'unit' && always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Security audit (blocking on critical)
        run: pnpm audit --audit-level=critical

      - name: Vital check audit
        run: node dist/scripts/vital_check.js --format json --exit-on-missing=false > /tmp/vital-check-report.json
