version: '3.8'

services:
  gemini-agent:
    build:
      context: .
      target: development
    volumes:
      # Mount source code for live reload, excluding node_modules
      - .:/app
      # Use a named volume for container-specific node_modules
      - node_modules_data:/app/node_modules
    environment:
      - NODE_ENV=development
      # Pass through host credentials if needed, or use vault/secrets
    entrypoint: ['node', 'scripts/cli.cjs']
    command: ['list', 'implemented']

volumes:
  node_modules_data:
