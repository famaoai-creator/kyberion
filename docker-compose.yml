services:
  kyberion:
    build:
      context: .
      target: development
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_data:/app/node_modules
    environment:
      NODE_ENV: development
    command: >
      bash -lc "pnpm install --frozen-lockfile &&
      pnpm run validate &&
      pnpm build &&
      node dist/scripts/cli.js list implemented"

volumes:
  node_modules_data:
