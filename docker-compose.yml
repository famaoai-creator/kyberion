version: '3.8'

services:
  gemini-agent:
    build:
      context: .
      target: development
    volumes:
      # Mount source code for live development
      - .:/app
      # Use a named volume for container-specific node_modules to avoid host conflicts
      - node_modules_data:/app/node_modules
    environment:
      - NODE_ENV=development
    entrypoint: >
      bash -c "node dist/scripts/bootstrap.js && 
      node dist/scripts/cli.js list implemented"

volumes:
  node_modules_data:
